name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built distributions to PyPI. Keep false for a build-only dry run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and check Python distributions
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate release version
        env:
          PUBLISH_REQUESTED: ${{ github.event_name == 'release' || inputs.publish == true }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          package_paths = {
              "axdata-core": Path("libs/axdata_core/pyproject.toml"),
              "axdata-source-tdx": Path("packages/axdata-source-tdx/pyproject.toml"),
              "axdata-source-tdx-ext": Path("packages/axdata-source-tdx-ext/pyproject.toml"),
              "axdata-source-tencent": Path("packages/axdata-source-tencent/pyproject.toml"),
              "axdata-source-cninfo": Path("packages/axdata-source-cninfo/pyproject.toml"),
              "axdata": Path("packages/axdata-sdk/pyproject.toml"),
          }
          versions = {}
          for name, path in package_paths.items():
              data = tomllib.loads(path.read_text(encoding="utf-8"))
              versions[name] = data["project"]["version"]

          unique_versions = sorted(set(versions.values()))
          if len(unique_versions) != 1:
              raise SystemExit(f"Package versions must match before release: {versions}")

          version = unique_versions[0]
          publish_requested = os.environ["PUBLISH_REQUESTED"].lower() == "true"
          tag = os.environ["RELEASE_TAG"]
          ref_type = os.environ["REF_TYPE"]

          if publish_requested:
              expected_tags = {version, f"v{version}"}
              if tag not in expected_tags:
                  raise SystemExit(
                      f"Release tag must be {version!r} or v{version!r}; got {tag!r}"
                  )
              if os.environ["GITHUB_EVENT_NAME"] != "release" and ref_type != "tag":
                  raise SystemExit("Manual PyPI publish must run from a git tag, not a branch.")

          print(f"Release package version: {version}")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Run PyPI readiness check
        run: python scripts/pypi_readiness.py --json

      - name: Build release distributions
        run: |
          python -m build --sdist --wheel --outdir release-dist/axdata-core libs/axdata_core
          python -m build --sdist --wheel --outdir release-dist/axdata-source-tdx packages/axdata-source-tdx
          python -m build --sdist --wheel --outdir release-dist/axdata-source-tdx-ext packages/axdata-source-tdx-ext
          python -m build --sdist --wheel --outdir release-dist/axdata-source-tencent packages/axdata-source-tencent
          python -m build --sdist --wheel --outdir release-dist/axdata-source-cninfo packages/axdata-source-cninfo
          python -m build --sdist --wheel --outdir release-dist/axdata packages/axdata-sdk

      - name: Check release distributions
        run: python -m twine check release-dist/*/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dists
          path: release-dist
          if-no-files-found: error

  attach-release-assets:
    name: Attach distributions to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release-dist/*/* --clobber

  publish-core:
    name: Publish axdata-core to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || inputs.publish == true
    environment:
      name: pypi-axdata-core
      url: https://pypi.org/project/axdata-core/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Publish axdata-core
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/axdata-core
          skip-existing: true

  publish-source-providers:
    name: Publish source providers to PyPI
    runs-on: ubuntu-latest
    needs: publish-core
    if: github.event_name == 'release' || inputs.publish == true
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: axdata-source-tdx
            environment: pypi-axdata-source-tdx
          - package: axdata-source-tdx-ext
            environment: pypi-axdata-source-tdx-ext
          - package: axdata-source-tencent
            environment: pypi-axdata-source-tencent
          - package: axdata-source-cninfo
            environment: pypi-axdata-source-cninfo
    environment:
      name: ${{ matrix.environment }}
      url: https://pypi.org/project/${{ matrix.package }}/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Publish ${{ matrix.package }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/${{ matrix.package }}
          skip-existing: true

  publish-sdk:
    name: Publish axdata to PyPI
    runs-on: ubuntu-latest
    needs: publish-source-providers
    if: github.event_name == 'release' || inputs.publish == true
    environment:
      name: pypi-axdata
      url: https://pypi.org/project/axdata/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Publish axdata
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/axdata
          skip-existing: true
